<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,800;1,1000&family=Open+Sans&family=Outfit:wght@300;400;500&family=Roboto+Mono:wght@500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />

  <link href="https://cdn.jsdelivr.net/gh/hung1001/font-awesome-pro@4cac1a6/css/all.css" rel="stylesheet"
    type="text/css" />

 

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=Quicksand:wght@300;400;500;600&family=Raleway:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
    rel="stylesheet">

</head>

<body>
  <div class="card">
    <div class="search">
      <input type="text" class="search-bar" placeholder="Search..." />
      <button>
        <i class="fal fa-search"></i>
      </button>
    </div>
    <div class="weather">
      <h2 id="city" class="city">Weather in</h2>
      <h1 class="temp">12°C</h1>
      <div class="flex">
        <img src="https://openweathermap.org/img/wn/09n.png" alt="" class="icon" />
        <p class="description">Overcast Clouds</p>
      </div>
      <div class="details">
        <div class="humid-container">
          <i class="fal fa-dewpoint"></i>
          <div class="humidity">Humidity: 74%</div>
        </div>
        <div class="wind-container">
          <i class="fal fa-paper-plane"></i>
          <div class="wind"></div>
        </div>
        <div class="airq-container">
          <i class="fal fa-leaf"></i>
          <div class="airq">70 AQI</div>
        </div>
      </div>
    </div>

    

    <div class="upcoming">

      <ul>

        <li class="up-1">
          <p class="up-1-day day">Sun 21</p>
          <span class="up-right">
            <h5 class="up-1-temp up-temp">40°</h5>
            <i class="fal fa-sun up-1-icon"></i>
            <p class="up-1-desc desc">Sunny</p>
          </span>

        </li>

        <li class="up-2">
          <p class="up-2-day day">Mon 22</p>
          <span class="up-right">
            <h5 class="up-2-temp up-temp">35°</h5>
            <i class="fal fa-sun-cloud up-2-icon"></i>
            <p class="up-2-desc desc">Partly Clouds</p>
          </span>
        </li>

        <li class="up-3">
          <p class="up-3-day day">Tue 23</p>
          <span class="up-right">
            <h5 class="up-3-temp up-temp">32°</h5>
            <i class="fal fa-cloud-sun up-3-icon"></i>
            <p class="up-3-desc desc">Scattered Clouds</p>
          </span>
        </li>

        <li class="up-4">
          <p class="up-4-day day">Wed 24</p>
          <span class="up-right">
            <h5 class="up-4-temp up-temp">30°</h5>
            <i class="fal fa-cloud-sun-rain up-4-icon"></i>
            <p class="up-4-desc desc">Precipitation</p>
          </span>
        </li>

        <li class="up-5">
          <p class="up-5-day day">Thu 25</p>
          <span class="up-right">
            <h5 class="up-4-temp up-temp">28°</h5>
            <i class="fal fa-cloud-sun-rain up-4-icon"></i>
            <p class="up-4-desc desc">Precipitation</p>
          </span>
        </li>

      </ul>

    </div>

    <div class="airq-progress-container">
      <h5>Air Quality: 70 AQI </h5>
      <div class="airq-progress">
      </div>
    </div>


  </div>
  <script src="./script.js"></script>
</body>

</html>
